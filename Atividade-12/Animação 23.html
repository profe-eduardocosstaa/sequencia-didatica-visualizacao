<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotação 2D - Letra F (Dark Mode)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fundo Escuro Profundo (Mesmo das outras) */
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        .container {
            background: #1e1e2e;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 { text-align: center; margin-bottom: 10px; font-size: 1.5rem; color: #fff; }
        
        /* Área de Exibição */
        .display-area {
            position: relative;
            height: 400px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A Letra F Estilizada */
        .letter-f {
            font-size: 250px;
            font-weight: 900;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efeito elástico suave */
            user-select: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); /* Brilho */
        }

        /* Indicador de Ângulo */
        .angle-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            color: #00b894;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            border: 1px solid #00b894;
            font-weight: bold;
        }

        /* Controles */
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .control-group {
            background: #2d2d44;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h3 { font-size: 0.9rem; color: #b3b3b3; margin-bottom: 10px; text-transform: uppercase; text-align: center; letter-spacing: 1px;}

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; justify-content: center; flex-wrap: wrap; }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            color: white;
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        button:hover { opacity: 1; transform: translateY(-1px); filter: brightness(1.1); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; background-color: #555 !important; color: #888;}
        
        /* Cores dos Botões */
        .btn-dir { background-color: #5352ed; }
        .btn-angle { background-color: #3742fa; }
        
        /* Estilos Ativos */
        button.active-dir, button.active-angle {
            background-color: #ffffff !important;
            color: #000 !important;
            border: 2px solid #5352ed;
            opacity: 1;
        }

        /* Botão Reset */
        #btn-reset {
            width: 100%;
            background-color: #e17055;
            margin-top: 5px;
            box-shadow: 0 4px 0 #d35400;
        }
        #btn-reset:active { transform: translateY(2px); box-shadow: none; }

        /* Info Box */
        .info-box {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-top: 10px;
            font-style: italic;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Rotação 2D: Letra F</h1>
    
    <div class="display-area">
        <div class="angle-indicator" id="angleDisplay">0°</div>
        <div class="letter-f" id="letterF">F</div>
    </div>

    <div class="controls">
        <div class="control-group">
            <h3>1. Direção</h3>
            <div class="btn-group">
                <button class="btn-dir" id="btnCW" onclick="selectDirection('clockwise')">Horário ↻</button>
                <button class="btn-dir" id="btnCCW" onclick="selectDirection('counterclockwise')">Anti-horário ↺</button>
            </div>
        </div>

        <div class="control-group">
            <h3>2. Ângulo</h3>
            <div class="btn-group">
                <button class="btn-angle" onclick="applyRotation(45)" disabled>45°</button>
                <button class="btn-angle" onclick="applyRotation(90)" disabled>90°</button>
                <button class="btn-angle" onclick="applyRotation(180)" disabled>180°</button>
                <button class="btn-angle" onclick="applyRotation(270)" disabled>270°</button>
            </div>
        </div>

        <div class="control-group" style="justify-content: center;">
            <h3>Controles</h3>
            <button id="btn-reset" onclick="resetRotation()">📍 Posição Inicial (0°)</button>
        </div>
    </div>
    
    <div class="info-box">Dica: Observe como a posição da letra muda em relação ao centro.</div>
</div>

<script>
    let currentAngle = 0;
    let selectedDirection = null; // 'clockwise' ou 'counterclockwise'
    
    const letterF = document.getElementById('letterF');
    const angleDisplay = document.getElementById('angleDisplay');
    const btnClockwise = document.getElementById('btnCW');
    const btnCounterClockwise = document.getElementById('btnCCW');
    const angleButtons = document.querySelectorAll('.btn-angle');

    function updateDisplay() {
        letterF.style.transform = `rotate(${currentAngle}deg)`;
        
        // Normalizar o ângulo para exibição (0-360)
        let displayAngle = currentAngle % 360;
        if (displayAngle < 0) {
            displayAngle += 360;
        }
        angleDisplay.innerText = `${displayAngle}°`;
    }

    function selectDirection(direction) {
        selectedDirection = direction;
        
        // Atualizar visual dos botões de direção
        btnClockwise.classList.remove('active-dir');
        btnCounterClockwise.classList.remove('active-dir');
        
        if (direction === 'clockwise') {
            btnClockwise.classList.add('active-dir');
        } else {
            btnCounterClockwise.classList.add('active-dir');
        }
        
        // Habilitar os botões de ângulo
        angleButtons.forEach(btn => {
            btn.disabled = false;
        });
    }

    function applyRotation(degrees) {
        if (selectedDirection === null) {
            alert('Por favor, escolha primeiro a direção (Horário ou Anti-horário)!');
            return;
        }
        
        if (selectedDirection === 'clockwise') {
            currentAngle += degrees;
        } else {
            currentAngle -= degrees;
        }
        
        updateDisplay();
    }

    function resetRotation() {
        currentAngle = 0;
        selectedDirection = null;
        
        // Limpar seleção visual
        btnClockwise.classList.remove('active-dir');
        btnCounterClockwise.classList.remove('active-dir');
        
        // Desabilitar botões de ângulo
        angleButtons.forEach(btn => {
            btn.disabled = true;
        });
        
        updateDisplay();
    }

    // Inicializar
    updateDisplay();
</script>
</body>
</html>
