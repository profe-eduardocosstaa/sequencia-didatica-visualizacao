<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotação do Quadro: O Grito (Calibrado)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖼️</text></svg>">
    <style>
        /* --- ESTILO GERAL (DARK MODE GEOMÉTRICO) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
            color: #e0e0e0;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            gap: 25px;
            height: 90vh;
        }

        .canvas-container {
            flex: 2;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 2px solid #333;
            position: relative;
        }
        #canvas3d { width: 100%; height: 100%; display: block; }

        .controls-panel {
            flex: 1;
            max-width: 400px;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }

        h1 { text-align: center; font-size: 1.8rem; color: #fff; margin-bottom: 10px; letter-spacing: 1px; }
        h2 { font-size: 1rem; color: #b3b3b3; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        .control-group {
            background: rgba(45, 45, 68, 0.5);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #444;
        }

        /* Radio Buttons */
        .pivot-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pivot-option { position: relative; }
        .pivot-option input { position: absolute; opacity: 0; cursor: pointer; }
        .pivot-btn-label {
            display: flex; align-items: center; justify-content: center;
            padding: 12px; background: #2d2d44; border: 2px solid #555;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .pivot-option input:checked + .pivot-btn-label {
            background: #ff4757; color: white; border-color: #ff6b81;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
        }
        .point-indicator { display: inline-block; width: 8px; height: 8px; background: currentColor; border-radius: 50%; margin-right: 6px; }

        select, input[type="number"] {
            width: 100%; padding: 12px; background: #1a1a2e; border: 1px solid #555;
            color: white; border-radius: 8px; font-size: 1rem; outline: none;
        }
        select:focus, input:focus { border-color: #ff4757; }

        .btn-group-angles { display: flex; gap: 8px; margin-top: 10px; }
        .angle-btn {
            flex: 1; padding: 8px; background: #3742fa; border: none; color: white;
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .angle-btn:hover { background: #5352ed; transform: translateY(-2px); }

        .action-buttons { margin-top: auto; display: flex; flex-direction: column; gap: 15px; }
        
        #btn-animate {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: white; font-weight: bold; font-size: 1.1rem;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
        }
        #btn-animate:hover:not(:disabled) { transform: scale(1.03); box-shadow: 0 6px 25px rgba(0, 184, 148, 0.5); }
        #btn-animate:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }

        #btn-reset {
            width: 100%; padding: 12px; background: #d63031; color: white;
            border: none; border-radius: 12px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        #btn-reset:hover { background: #e17055; }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column; height: auto; }
            .canvas-container { height: 500px; }
            .controls-panel { max-width: 1000px; }
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div class="main-layout">
    <div class="canvas-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <div class="controls-panel">
        <h1>O Grito: Rotação</h1>

        <div class="control-group">
            <h2>1. Escolha o Ponto de Giro</h2>
            <div class="pivot-selector">
                <label class="pivot-option">
                    <input type="radio" name="pivot" value="A" checked>
                    <span class="pivot-btn-label"><span class="point-indicator"></span>Ponto A (SE)</span>
                </label>
                <label class="pivot-option">
                    <input type="radio" name="pivot" value="B">
                    <span class="pivot-btn-label"><span class="point-indicator"></span>Ponto B (SD)</span>
                </label>
                <label class="pivot-option">
                    <input type="radio" name="pivot" value="C">
                    <span class="pivot-btn-label"><span class="point-indicator"></span>Ponto C (IE)</span>
                </label>
                <label class="pivot-option">
                    <input type="radio" name="pivot" value="D">
                    <span class="pivot-btn-label"><span class="point-indicator"></span>Ponto D (ID)</span>
                </label>
            </div>
        </div>

        <div class="control-group">
            <h2>2. Configurar Movimento</h2>
            <label style="font-size: 0.9rem; color: #b3b3b3;">Direção:</label>
            <select id="directionSelect">
                <option value="1">Sentido Anti-horário (↺)</option>
                <option value="-1">Sentido Horário (↻)</option>
            </select>

            <label style="font-size: 0.9rem; color: #b3b3b3; margin-top: 15px; display: block;">Ângulo (Graus):</label>
            <input type="number" id="angleInput" value="90" min="0" max="720">
            <div class="btn-group-angles">
                <button class="angle-btn" onclick="setAngle(45)">45°</button>
                <button class="angle-btn" onclick="setAngle(90)">90°</button>
                <button class="angle-btn" onclick="setAngle(180)">180°</button>
            </div>
        </div>

        <div class="action-buttons">
            <button id="btn-animate" onclick="startRotation()">ROTACIONAR QUADRO</button>
            <button id="btn-reset" onclick="resetScene()">🔄 Voltar à Posição Inicial</button>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, controls;
    let masterGroup, innerPaintingGroup; 
    
    let isAnimating = false;
    let targetRotationZ = 0;
    let currentRotationSpeed = 0;
    let currentPivotPoint = 'A';

    const frameWidth = 6;
    const frameHeight = 8;
    const frameDepth = 0.4;

    const cornerOffsets = {
        'A': new THREE.Vector3(-frameWidth/2, frameHeight/2, 0),
        'B': new THREE.Vector3(frameWidth/2, frameHeight/2, 0), 
        'C': new THREE.Vector3(-frameWidth/2, -frameHeight/2, 0),
        'D': new THREE.Vector3(frameWidth/2, -frameHeight/2, 0)
    };

    // --- CALIBRAÇÃO DA CÂMERA (A SOLUÇÃO) ---
    // Aumentei o Z para 28 (estava 15) para caber o arco do giro
    const initialCameraPos = { x: 0, y: 0, z: 28 };

    function init() {
        const canvas = document.getElementById('canvas3d');
        
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x121212);
        scene.fog = new THREE.Fog(0x121212, 30, 60);

        // Usei FOV de 35 (Zoom Óptico) em vez de 50. 
        // Isso aproxima a imagem sem distorcer, mantendo o quadro visível.
        camera = new THREE.PerspectiveCamera(35, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.set(initialCameraPos.x, initialCameraPos.y, initialCameraPos.z);

        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.outputEncoding = THREE.sRGBEncoding;

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 50;
        controls.minPolarAngle = Math.PI / 3; 
        controls.maxPolarAngle = Math.PI / 1.5;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xffebc4, 1.5);
        spotLight.position.set(0, 5, 20);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.3;
        spotLight.decay = 1; // Decay menor para iluminar mais longe
        spotLight.distance = 60;
        spotLight.castShadow = true;
        scene.add(spotLight);
        scene.add(spotLight.target);

        createEnvironment();
        createPaintingSystem();

        window.addEventListener('resize', onWindowResize);
        document.querySelectorAll('input[name="pivot"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(!isAnimating) currentPivotPoint = e.target.value;
            });
        });

        animate();
    }

    function createEnvironment() {
        const wallMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2c2c3a, roughness: 0.9, metalness: 0.1
        });
        const wallGeometry = new THREE.PlaneGeometry(60, 60);
        const wall = new THREE.Mesh(wallGeometry, wallMaterial);
        wall.position.z = -frameDepth/2 - 0.1;
        wall.receiveShadow = true;
        scene.add(wall);
    }

    function createPaintingSystem() {
        masterGroup = new THREE.Group();
        scene.add(masterGroup);

        innerPaintingGroup = new THREE.Group();
        masterGroup.add(innerPaintingGroup);

        const frameGeometry = new THREE.BoxGeometry(frameWidth + 0.5, frameHeight + 0.5, frameDepth);
        const frameMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3d2817, roughness: 0.8, metalness: 0.2
        });
        const frameMesh = new THREE.Mesh(frameGeometry, frameMaterial);
        frameMesh.castShadow = true;
        innerPaintingGroup.add(frameMesh);

        // Imagem embutida em base64 — sem CORS, funciona em qualquer navegador
        const img = new Image();
        img.onload = function() {
            const texture = new THREE.Texture(img);
            texture.needsUpdate = true;
            const imageAspect = img.width / img.height;
            const paintingWidth = frameWidth - 0.5;
            const paintingHeight = paintingWidth / imageAspect;
            const paintingGeometry = new THREE.PlaneGeometry(paintingWidth, paintingHeight);
            const paintingMaterial = new THREE.MeshBasicMaterial({ map: texture });
            const paintingMesh = new THREE.Mesh(paintingGeometry, paintingMaterial);
            paintingMesh.position.z = frameDepth / 2 + 0.01;
            innerPaintingGroup.add(paintingMesh);
        };

    function createCornerMarkers() {
        const pointGeometry = new THREE.SphereGeometry(0.25, 16, 16); // Pontos ligeiramente maiores
        const pointMaterial = new THREE.MeshBasicMaterial({ color: 0xff4757 });

        Object.keys(cornerOffsets).forEach(key => {
            const pos = cornerOffsets[key];
            
            const marker = new THREE.Mesh(pointGeometry, pointMaterial);
            marker.position.set(pos.x, pos.y, frameDepth/2 + 0.1);
            innerPaintingGroup.add(marker);

            const labelText = createTextSprite(key);
            const labelOffsetX = (pos.x > 0) ? 0.6 : -0.6;
            const labelOffsetY = (pos.y > 0) ? 0.6 : -0.6;
            labelText.position.set(pos.x + labelOffsetX, pos.y + labelOffsetY, frameDepth/2 + 0.1);
            innerPaintingGroup.add(labelText);
        });
    }

    function createTextSprite(message) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 256;
        
        ctx.font = "Bold 120px Arial";
        ctx.fillStyle = "rgba(255,255,255,1)";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 15;
        ctx.fillText(message, 128, 128);
        
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, depthTest: false });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(1.5, 1.5, 1);
        return sprite;
    }

    window.setAngle = function(val) {
        document.getElementById('angleInput').value = val;
    };

    window.startRotation = function() {
        if (isAnimating) return;

        const angleDeg = parseFloat(document.getElementById('angleInput').value);
        const direction = parseFloat(document.getElementById('directionSelect').value);
        
        const angleRad = (angleDeg * Math.PI / 180) * direction;
        targetRotationZ = masterGroup.rotation.z + angleRad;

        const offsetVector = cornerOffsets[currentPivotPoint];

        innerPaintingGroup.position.copy(offsetVector).negate();
        masterGroup.position.copy(offsetVector);

        isAnimating = true;
        document.getElementById('btn-animate').disabled = true;
        document.querySelectorAll('input[name="pivot"]').forEach(r => r.disabled = true);

        currentRotationSpeed = Math.abs(angleRad) * 0.02;
        if (currentRotationSpeed < 0.01) currentRotationSpeed = 0.01;
    }

    function animateRotationStep() {
        if (!isAnimating) return;

        const currentZ = masterGroup.rotation.z;
        const diff = targetRotationZ - currentZ;

        if (Math.abs(diff) < 0.005) {
            masterGroup.rotation.z = targetRotationZ;
            finishAnimation();
        } else {
            masterGroup.rotation.z += Math.sign(diff) * currentRotationSpeed;
        }
    }

    function finishAnimation() {
        isAnimating = false;
        document.getElementById('btn-animate').disabled = false;
        document.querySelectorAll('input[name="pivot"]').forEach(r => r.disabled = false);
    }

    window.resetScene = function() {
        if (isAnimating) return;

        masterGroup.rotation.z = 0;
        masterGroup.position.set(0, 0, 0);
        innerPaintingGroup.position.set(0, 0, 0);

        // RESETANDO A CÂMERA para a posição calibrada
        camera.position.set(initialCameraPos.x, initialCameraPos.y, initialCameraPos.z);
        camera.lookAt(0, 0, 0);
        controls.reset();

        document.getElementById('angleInput').value = 90;
    }

    function animate() {
        requestAnimationFrame(animate);
        animateRotationStep();
        controls.update();
        renderer.render(scene, camera);
    }

    function onWindowResize() {
        const container = document.querySelector('.canvas-container');
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }

    init();
</script>
</body>
</html>
