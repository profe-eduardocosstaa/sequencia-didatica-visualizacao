<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubos Geométricos - Animação Educacional</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body.final-screen {
            background: 
                linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
            background-size: 60px 60px;
            background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
            background-color: #0f3460;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 100;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        
        #question {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }
        
        #question p {
            margin: 20px 0;
            font-size: 36px;
        }
        
        #symbols {
            font-size: 80px;
            margin-top: 40px;
            letter-spacing: 60px;
        }
        
        #geometricBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 50;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .circle {
            border-radius: 50%;
        }
        
        .triangle {
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid rgba(255, 255, 255, 0.15);
            border: none;
            background: none;
        }
        
        .triangle::before {
            content: '';
            position: absolute;
            top: 0;
            left: -40px;
            width: 0;
            height: 0;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            border-bottom: 70px solid rgba(255, 255, 255, 0.15);
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: white;
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #timer {
            position: absolute;
            top: 80px;
            right: 30px;
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="geometricBackground"></div>
    <div id="container"></div>
    <div id="timer">Tempo: <span id="time">10.0</span>s</div>
    <div id="question">
        <div>Os sólidos são iguais ou diferentes?</div>
        <p>Levante sua placa!</p>
        <div id="symbols">= ≠</div>
    </div>
    <div id="controls">
        <button id="playBtn">▶ Reproduzir</button>
        <button id="pauseBtn">⏸ Pausar</button>
        <button id="loopBtn">🔁 Contínuo: OFF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Função para criar formas geométricas no fundo
        function createGeometricBackground() {
            const background = document.getElementById('geometricBackground');
            const shapes = ['circle', 'square', 'triangle'];
            const numShapes = 25;
            
            for (let i = 0; i < numShapes; i++) {
                const shapeType = shapes[Math.floor(Math.random() * shapes.length)];
                const shape = document.createElement('div');
                shape.className = `shape ${shapeType}`;
                
                // Posição aleatória
                shape.style.left = Math.random() * 100 + '%';
                shape.style.top = Math.random() * 100 + '%';
                
                // Tamanho aleatório
                const size = 30 + Math.random() * 80;
                if (shapeType !== 'triangle') {
                    shape.style.width = size + 'px';
                    shape.style.height = size + 'px';
                }
                
                // Rotação aleatória
                shape.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                background.appendChild(shape);
            }
        }
        
        // Criar o fundo geométrico quando a página carregar
        createGeometricBackground();
        
        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        
        // Câmera
        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 4, 10);
        camera.lookAt(0, 0, 0);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.9);
        directionalLight1.position.set(8, 12, 6);
        directionalLight1.castShadow = true;
        directionalLight1.shadow.mapSize.width = 2048;
        directionalLight1.shadow.mapSize.height = 2048;
        scene.add(directionalLight1);
        
        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight2.position.set(-6, 8, -4);
        scene.add(directionalLight2);
        
        const directionalLight3 = new THREE.DirectionalLight(0xffffff, 0.3);
        directionalLight3.position.set(0, -5, 8);
        scene.add(directionalLight3);
        
        // Chão
        const floorGeometry = new THREE.PlaneGeometry(20, 20);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x34495e,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Grid no chão
        const gridHelper = new THREE.GridHelper(20, 20, 0x7f8c8d, 0x7f8c8d);
        gridHelper.position.y = -1.99;
        scene.add(gridHelper);
        
        // Material dos cubos - ambos com a mesma cor para evitar confusão
        const cubeSize = 2;
        const cubeMaterial1 = new THREE.MeshStandardMaterial({ 
            color: 0xe74c3c,
            roughness: 0.5,
            metalness: 0.3
        });
        const cubeMaterial2 = new THREE.MeshStandardMaterial({ 
            color: 0xe74c3c,
            roughness: 0.5,
            metalness: 0.3
        });
        
        // Cubo 1 - Apoiado em uma face (esquerda)
        const cubeGeometry1 = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const cube1 = new THREE.Mesh(cubeGeometry1, cubeMaterial1);
        cube1.position.set(-3, -1, 0);
        cube1.castShadow = true;
        cube1.receiveShadow = true;
        scene.add(cube1);
        
        // Borda do cubo 1
        const edges1 = new THREE.EdgesGeometry(cubeGeometry1);
        const lineMaterial1 = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const wireframe1 = new THREE.LineSegments(edges1, lineMaterial1);
        cube1.add(wireframe1);
        
        // Cubo 2 - Apoiado em um vértice (direita)
        const cubeGeometry2 = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const cube2 = new THREE.Mesh(cubeGeometry2, cubeMaterial2);
        cube2.position.set(3, -1, 0);
        
        // Rotação inicial para apoiar no vértice
        // O vértice do cubo fica em (1,1,1) normalizado
        // Precisamos rotacionar para que esse vértice aponte para baixo
        const angle = Math.acos(1 / Math.sqrt(3));
        cube2.rotation.x = angle;
        cube2.rotation.z = Math.PI / 4;
        
        // Ajustar altura para o vértice tocar o chão
        const vertexHeight = cubeSize * Math.sqrt(3) / 2;
        cube2.position.y = -2 + vertexHeight;
        
        cube2.castShadow = true;
        cube2.receiveShadow = true;
        scene.add(cube2);
        
        // Borda do cubo 2
        const edges2 = new THREE.EdgesGeometry(cubeGeometry2);
        const lineMaterial2 = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const wireframe2 = new THREE.LineSegments(edges2, lineMaterial2);
        cube2.add(wireframe2);
        
        // Labels - posicionados mais altos para não cobrir os cubos
        function createLabel(text, position) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            
            context.fillStyle = 'rgba(255, 255, 255, 0.9)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            context.font = 'bold 40px Arial';
            context.fillStyle = 'black';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.copy(position);
            sprite.scale.set(2, 1, 1);
            
            return sprite;
        }
        
        const label1 = createLabel('Sólido A', new THREE.Vector3(-3, 2.5, 0));
        const label2 = createLabel('Sólido B', new THREE.Vector3(3, 3.5, 0));
        scene.add(label1);
        scene.add(label2);
        
        // Controles de animação
        let animationTime = 0;
        let isPlaying = true;
        let loopEnabled = false;
        let animationDuration = 10; // segundos - volta completa
        const rotationSpeed = (Math.PI * 2) / animationDuration; // uma volta completa em 10 segundos
        
        // Parâmetros do movimento orbital da câmera
        const cameraRadius = 10; // distância do centro
        const cameraStartAngle = 0; // começa na frente (0 graus)
        const cameraEndAngle = Math.PI * 2; // volta completa (360 graus)
        const cameraStartHeight = 4;
        const cameraMaxHeight = 9; // altura máxima quando passa por cima
        
        // Salvar rotações iniciais
        const cube2InitialRotation = {
            x: cube2.rotation.x,
            y: cube2.rotation.y,
            z: cube2.rotation.z
        };
        
        // Botões
        document.getElementById('playBtn').addEventListener('click', () => {
            // Se a animação terminou, reinicia antes de reproduzir
            if (animationTime >= animationDuration) {
                animationTime = 0;
                cube1.rotation.y = 0;
                cube2.rotation.x = cube2InitialRotation.x;
                cube2.rotation.y = 0;
                cube2.rotation.z = cube2InitialRotation.z;
                
                // Restaurar a tela e interface
                document.getElementById('geometricBackground').style.display = 'none';
                document.getElementById('container').style.display = 'block';
                document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                scene.background = new THREE.Color(0x2c3e50);
                document.getElementById('timer').style.display = 'block';
                document.getElementById('pauseBtn').style.display = 'block';
                document.getElementById('question').style.display = 'none';
                document.getElementById('time').textContent = '10.0';
                
                // Mostrar todos os objetos da cena
                scene.children.forEach(child => {
                    child.visible = true;
                });
            }
            isPlaying = true;
        });
        
        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPlaying = false;
        });
        
        document.getElementById('loopBtn').addEventListener('click', () => {
            loopEnabled = !loopEnabled;
            const loopBtn = document.getElementById('loopBtn');
            loopBtn.textContent = loopEnabled ? '🔁 Contínuo: ON' : '🔁 Contínuo: OFF';
            loopBtn.style.background = loopEnabled ? 'rgba(76, 175, 80, 0.9)' : 'rgba(255, 255, 255, 0.9)';
        });
        
        // Animação
        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlaying && animationTime < animationDuration) {
                const deltaTime = 0.016; // aproximadamente 60fps
                animationTime += deltaTime;
                
                // Calcular progresso da animação (0 a 1)
                const progress = animationTime / animationDuration;
                
                // Rotacionar cubo 1 (no eixo Y)
                cube1.rotation.y += rotationSpeed * deltaTime;
                
                // Rotacionar cubo 2 (no eixo Y, mas mantendo a inclinação)
                cube2.rotation.y += rotationSpeed * deltaTime;
                
                // Movimento orbital da câmera tipo drone
                const currentAngle = cameraStartAngle + (cameraEndAngle - cameraStartAngle) * progress;
                
                // Calcular altura da câmera com curva suave para volta completa
                // Usa seno para subir e descer suavemente durante os 360 graus
                const heightProgress = Math.sin(progress * Math.PI * 2) * 0.5 + 0.5; // varia de 0 a 1 suavemente
                const currentHeight = cameraStartHeight + heightProgress * (cameraMaxHeight - cameraStartHeight);
                
                // Posição orbital (círculo em volta dos cubos)
                camera.position.x = Math.sin(currentAngle) * cameraRadius;
                camera.position.z = Math.cos(currentAngle) * cameraRadius;
                camera.position.y = currentHeight;
                
                // Câmera sempre olha para o centro (onde estão os cubos)
                camera.lookAt(0, 0, 0);
                
                // Atualizar timer
                const timeRemaining = Math.max(0, animationDuration - animationTime);
                document.getElementById('time').textContent = timeRemaining.toFixed(1);
                
                // Parar quando chegar ao fim
                if (animationTime >= animationDuration) {
                    // Se loop estiver ativado, reinicia automaticamente
                    if (loopEnabled) {
                        animationTime = 0;
                        cube1.rotation.y = 0;
                        cube2.rotation.x = cube2InitialRotation.x;
                        cube2.rotation.y = 0;
                        cube2.rotation.z = cube2InitialRotation.z;
                    } else {
                        isPlaying = false;
                        document.getElementById('time').textContent = '0.0';
                        
                        // Mostrar fundo geométrico e esconder canvas 3D
                        document.getElementById('geometricBackground').style.display = 'block';
                        document.getElementById('container').style.display = 'none';
                        document.body.style.background = '#000000';
                        
                        // Esconder interface exceto os botões de controle
                        document.getElementById('timer').style.display = 'none';
                        document.getElementById('pauseBtn').style.display = 'none';
                        
                        // Mostrar a pergunta
                        document.getElementById('question').style.display = 'block';
                        // Manter playBtn e loopBtn visíveis
                        
                        // Esconder todos os objetos da cena
                        scene.children.forEach(child => {
                            child.visible = false;
                        });
                    }
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Responsividade
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Iniciar animação
        animate();
    </script>
</body>
</html>
